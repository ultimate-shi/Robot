# 关节状态广播器
joint_state_broadcaster:
  ros__parameters:
    type: joint_state_broadcaster/JointStateBroadcaster
    publish_rate: 20.0
    use_system_time: true


lap_fr_position_controller:
  ros__parameters:
    type: position_controllers/JointGroupPositionController
    joints: [lap_body_joint_fr]
    pid: {p: 100.0, i: 0.01, d: 10.0}

lap_fl_position_controller:
  ros__parameters:
    type: position_controllers/JointGroupPositionController
    joints: [lap_body_joint_fl]
    pid: {p: 100.0, i: 0.01, d: 10.0}

lap_rr_position_controller:
  ros__parameters:
    type: position_controllers/JointGroupPositionController
    joints: [lap_body_joint_rr]
    pid: {p: 100.0, i: 0.01, d: 10.0}

lap_rl_position_controller:
  ros__parameters:
    type: position_controllers/JointGroupPositionController
    joints: [lap_body_joint_rl]
    pid: {p: 100.0, i: 0.01, d: 10.0}

shin_fr_position_controller:
  ros__parameters:
    type: position_controllers/JointGroupPositionController
    joints: [shin_lap_fr_joint_fr]
    pid: {p: 80.0, i: 0.01, d: 8.0}

shin_fl_position_controller:
  ros__parameters:
    type: position_controllers/JointGroupPositionController
    joints: [shin_lap_fl_joint_fl]
    pid: {p: 80.0, i: 0.01, d: 8.0}

shin_rr_position_controller:
  ros__parameters:
    type: position_controllers/JointGroupPositionController
    joints: [shin_lap_rr_joint_rr]
    pid: {p: 80.0, i: 0.01, d: 8.0}

shin_rl_position_controller:
  ros__parameters:
    type: position_controllers/JointGroupPositionController
    joints: [shin_lap_rl_joint_rl]
    pid: {p: 80.0, i: 0.01, d: 8.0}



steering_controller:
  ros__parameters:
    type: position_controllers/JointGroupPositionController
    joints:
      - front_left_steer_joint
      - front_right_steer_joint
      - rear_left_steer_joint
      - rear_right_steer_joint

wheel_controller:
  ros__parameters:
    type: velocity_controllers/JointGroupVelocityController
    joints:
      - front_left_wheel_joint
      - front_right_wheel_joint
      - rear_left_wheel_joint
      - rear_right_wheel_joint